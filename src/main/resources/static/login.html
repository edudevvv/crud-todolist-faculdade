<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TaskManager</title>
  <link href="images/taskmanager-icon.svg" rel="icon"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
    .form-control, .form-select {
      background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
    }
    .form-control:focus, .form-select:focus {
      background: #0d1117; border-color: #7c3aed; color: #e6edf3; box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }
    .form-control::placeholder { color: #484f58; }
    .btn-purple { background: #7c3aed; border: none; color: #fff; font-weight: 600; }
    .btn-purple:hover { background: #6d28d9; color: #fff; }
    .brand { font-size: 1.5rem; font-weight: 800; color: #7c3aed; letter-spacing: -0.5px; }
    label { color: #8b949e; font-size: .85rem; }
    .text-muted-custom { color: #8b949e !important; font-size: .85rem; }
    a { color: #7c3aed; text-decoration: none; }
    a:hover { color: #a78bfa; }
    .divider { border-color: #30363d; }
  </style>
</head>
<body>
  <div class="container" style="max-width:420px">
    <div class="text-center mb-4">
      <div class="brand"><i class="bi bi-check2-square me-2"></i>TaskManager</div>
      <p class="text-muted-custom mt-1">Gerencie suas tarefas com eficiência</p>
    </div>

    <div class="card p-4 shadow">
      <h5 class="text-white fw-bold mb-1">Entrar na conta</h5>
      <p class="text-muted-custom mb-4">Bem-vindo de volta!</p>

      <div id="alert" class="alert d-none py-2" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="seu@email.com" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required />
          </div>
        </div>
        <button type="submit" class="btn btn-purple w-100 py-2" id="submitBtn">
          Entrar
        </button>
      </form>

      <hr class="divider my-3" />
      <p class="text-center text-muted-custom mb-0">
        Não tem conta? <a href="/register">Criar conta</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg, type = 'danger') {
      alertEl.textContent = msg;
      alertEl.className = `alert alert-${type} py-2`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.className = 'alert d-none py-2';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showAlert(data.message || 'Credenciais inválidas.');
          return;
        }

        localStorage.setItem('token', data.data);
        window.location.href = '/dashboard';
      } catch {
        showAlert('Erro de conexão. Tente novamente.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Entrar';
      }
    });
  </script>
</body>
</html>
