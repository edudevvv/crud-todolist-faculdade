<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskManager</title>

  <link href="images/taskmanager-icon.svg" rel="icon"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #7c3aed;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

    /* Navbar */
    .navbar-custom { background: var(--surface); border-bottom: 1px solid var(--border); }
    .brand { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .navbar-custom .nav-link { color: var(--muted); font-size: .88rem; }
    .navbar-custom .nav-link:hover { color: var(--text); }
    .user-chip { background: #21262d; border: 1px solid var(--border); color: var(--muted);
                 border-radius: 20px; padding: 4px 14px; font-size: .82rem; }

    /* Stats bar */
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
                 padding: 16px 20px; }
    .stat-card .stat-num { font-size: 1.6rem; font-weight: 700; }
    .stat-card .stat-label { font-size: .78rem; color: var(--muted); }

    /* Filters */
    .filter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
    .form-control, .form-select {
      background: #0d1117; border: 1px solid var(--border); color: var(--text); font-size: .88rem;
    }
    .form-control:focus, .form-select:focus {
      background: #0d1117; border-color: var(--accent); color: var(--text);
      box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }
    .form-control::placeholder { color: #484f58; }
    .form-select option { background: #161b22; }

    /* Task card */
    .task-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 18px; cursor: pointer; transition: border-color .2s, transform .15s;
      border-left: 4px solid transparent;
    }
    .task-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .task-card.priority-HIGH  { border-left-color: #f85149; }
    .task-card.priority-MEDIUM{ border-left-color: #d29922; }
    .task-card.priority-LOW   { border-left-color: #3fb950; }

    .task-title { font-weight: 600; font-size: .95rem; margin-bottom: 4px; }
    .task-desc  { font-size: .82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }

    /* Badges */
    .badge-priority-HIGH   { background: rgba(248,81,73,.15);  color: #f85149; border: 1px solid #f85149; }
    .badge-priority-MEDIUM { background: rgba(210,153,34,.15); color: #d29922; border: 1px solid #d29922; }
    .badge-priority-LOW    { background: rgba(63,185,80,.15);  color: #3fb950; border: 1px solid #3fb950; }
    .badge-PENDING     { background: rgba(139,148,158,.15); color: #8b949e; border: 1px solid #8b949e; }
    .badge-IN_PROGRESS { background: rgba(88,166,255,.15);  color: #58a6ff; border: 1px solid #58a6ff; }
    .badge-DONE        { background: rgba(63,185,80,.15);   color: #3fb950; border: 1px solid #3fb950; }
    .badge-custom { font-size: .72rem; padding: 3px 8px; border-radius: 20px; font-weight: 600; }

    /* Buttons */
    .btn-purple { background: var(--accent); border: none; color: #fff; font-weight: 600; }
    .btn-purple:hover { background: #6d28d9; color: #fff; }
    .btn-outline-custom { border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: .82rem; }
    .btn-outline-custom:hover { border-color: #f85149; color: #f85149; }

    /* Modal */
    .modal-content { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 12px; }
    .modal-header { border-bottom: 1px solid var(--border); }
    .modal-footer { border-top: 1px solid var(--border); }
    .btn-close { filter: invert(1); }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state i { font-size: 3rem; opacity: .4; }

    label { color: var(--muted); font-size: .83rem; }
    .text-muted-custom { color: var(--muted) !important; font-size: .82rem; }
    a { color: var(--accent); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-custom px-4 py-2">
  <span class="brand"><i class="bi bi-check2-square me-2"></i>TaskManager</span>
  <div class="d-flex align-items-center gap-3">
    <span class="user-chip"><i class="bi bi-person-circle me-1"></i><span id="userEmail">—</span></span>
    <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
  </div>
</nav>

<!-- Main -->
<div class="container py-4" style="max-width:900px">

  <!-- Stats -->
  <div class="row g-3 mb-4" id="statsRow">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-num text-white" id="statTotal">—</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-num" style="color:#8b949e" id="statPending">—</div>
        <div class="stat-label">Pendente</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-num" style="color:#58a6ff" id="statProgress">—</div>
        <div class="stat-label">Em progresso</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-num" style="color:#3fb950" id="statDone">—</div>
        <div class="stat-label">Concluídas</div>
      </div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar mb-3 d-flex flex-wrap gap-2 align-items-center justify-content-between">
    <div class="d-flex gap-2 flex-wrap">
      <input type="text" id="searchInput" class="form-control" style="width:200px" placeholder="Buscar tarefa..." oninput="filterTasks()" />
      <select id="filterStatus" class="form-select" style="width:150px" onchange="filterTasks()">
        <option value="">Todos status</option>
        <option value="PENDING">Pendente</option>
        <option value="IN_PROGRESS">Em progresso</option>
        <option value="DONE">Concluída</option>
      </select>
      <select id="filterPriority" class="form-select" style="width:150px" onchange="filterTasks()">
        <option value="">Todas prioridades</option>
        <option value="HIGH">Alta</option>
        <option value="MEDIUM">Média</option>
        <option value="LOW">Baixa</option>
      </select>
    </div>
    <button class="btn btn-purple" onclick="openCreate()">
      <i class="bi bi-plus-lg me-1"></i>Nova tarefa
    </button>
  </div>

  <!-- Task list -->
  <div id="taskList"></div>
</div>

<!-- ── Modal: Detalhes / Editar ── -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold" id="detailModalTitle">Detalhes da Tarefa</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-outline-danger" id="detailDeleteBtn">
          <i class="bi bi-trash me-1"></i>Excluir
        </button>
        <button class="btn btn-sm btn-purple" id="detailEditBtn">
          <i class="bi bi-pencil me-1"></i>Editar
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal: Criar / Editar form ── -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold" id="formModalTitle">Nova Tarefa</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="formAlert" class="alert d-none py-2"></div>
        <input type="hidden" id="editingId" />

        <div class="mb-3">
          <label class="form-label">Título *</label>
          <input type="text" id="fTitle" class="form-control" placeholder="Título da tarefa" />
        </div>
        <div class="mb-3">
          <label class="form-label">Descrição *</label>
          <textarea id="fDesc" class="form-control" rows="3" placeholder="Descreva a tarefa..."></textarea>
        </div>
        <div class="row g-2">
          <div class="col">
            <label class="form-label">Prioridade</label>
            <select id="fPriority" class="form-select">
              <option value="LOW">Baixa</option>
              <option value="MEDIUM" selected>Média</option>
              <option value="HIGH">Alta</option>
            </select>
          </div>
          <div class="col">
            <label class="form-label">Status</label>
            <select id="fStatus" class="form-select">
              <option value="PENDING" selected>Pendente</option>
              <option value="IN_PROGRESS">Em progresso</option>
              <option value="DONE">Concluída</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-sm btn-purple" id="formSubmitBtn" onclick="submitForm()">Criar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login';

  // Decode JWT email
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    document.getElementById('userEmail').textContent = payload.sub || '—';
  } catch {}

  let allTasks = [];
  const detailModalEl = document.getElementById('detailModal');
  const formModalEl   = document.getElementById('formModal');
  const detailModal   = new bootstrap.Modal(detailModalEl);
  const formModal     = new bootstrap.Modal(formModalEl);

  function authHeaders() {
    return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login';
  }

  // ── Labels ──
  const priorityLabel = { HIGH: 'Alta', MEDIUM: 'Média', LOW: 'Baixa' };
  const statusLabel   = { PENDING: 'Pendente', IN_PROGRESS: 'Em progresso', DONE: 'Concluída' };
  const priorityIcon  = { HIGH: 'bi-arrow-up-circle-fill', MEDIUM: 'bi-dash-circle-fill', LOW: 'bi-arrow-down-circle-fill' };

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' });
  }

  // ── Load ──
  async function loadTasks() {
    try {
      const res = await fetch('/tasks/list', { headers: authHeaders() });
      if (res.status === 401 || res.status === 403) { logout(); return; }
      const data = await res.json();
      allTasks = data.data || [];
      updateStats(allTasks);
      filterTasks();
    } catch {
      document.getElementById('taskList').innerHTML =
        '<div class="empty-state"><i class="bi bi-wifi-off d-block mb-2"></i>Erro ao carregar tarefas.</div>';
    }
  }

  function updateStats(tasks) {
    document.getElementById('statTotal').textContent    = tasks.length;
    document.getElementById('statPending').textContent  = tasks.filter(t => t.status === 'PENDING').length;
    document.getElementById('statProgress').textContent = tasks.filter(t => t.status === 'IN_PROGRESS').length;
    document.getElementById('statDone').textContent     = tasks.filter(t => t.status === 'DONE').length;
  }

  function filterTasks() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const st = document.getElementById('filterStatus').value;
    const pr = document.getElementById('filterPriority').value;

    const filtered = allTasks.filter(t =>
      (!q  || t.title.toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q)) &&
      (!st || t.status === st) &&
      (!pr || t.priority === pr)
    );
    renderTasks(filtered);
  }

  function renderTasks(tasks) {
    const list = document.getElementById('taskList');
    if (!tasks.length) {
      list.innerHTML = `<div class="empty-state">
        <i class="bi bi-inbox d-block mb-3"></i>
        <p class="mb-0">Nenhuma tarefa encontrada.</p>
      </div>`;
      return;
    }

    list.innerHTML = tasks.map(t => `
      <div class="task-card mb-2 priority-${t.priority}" onclick="openDetail('${t.id}')">
        <div class="d-flex align-items-start justify-content-between gap-3">
          <div style="min-width:0">
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-desc">${escHtml(t.description)}</div>
          </div>
          <div class="d-flex gap-1 flex-shrink-0 align-items-center">
            <span class="badge-custom badge-priority-${t.priority}">
              <i class="bi ${priorityIcon[t.priority]} me-1"></i>${priorityLabel[t.priority]}
            </span>
            <span class="badge-custom badge-${t.status}">${statusLabel[t.status]}</span>
          </div>
        </div>
        <div class="mt-2 text-muted-custom">
          <i class="bi bi-clock me-1"></i>${fmtDate(t.createdAt)}
        </div>
      </div>
    `).join('');
  }

  // ── Detail modal ──
  function openDetail(id) {
    const t = allTasks.find(x => x.id === id);
    if (!t) return;

    document.getElementById('detailModalTitle').textContent = t.title;
    document.getElementById('detailModalBody').innerHTML = `
      <div class="d-flex gap-2 mb-3">
        <span class="badge-custom badge-priority-${t.priority}">
          <i class="bi ${priorityIcon[t.priority]} me-1"></i>Prioridade ${priorityLabel[t.priority]}
        </span>
        <span class="badge-custom badge-${t.status}">${statusLabel[t.status]}</span>
      </div>
      <p class="mb-4" style="color:#cdd9e5;line-height:1.6">${escHtml(t.description)}</p>
      <div class="row g-2 text-muted-custom">
        <div class="col-6"><i class="bi bi-calendar-plus me-1"></i><strong>Criada:</strong><br>${fmtDate(t.createdAt)}</div>
        <div class="col-6"><i class="bi bi-calendar-check me-1"></i><strong>Atualizada:</strong><br>${fmtDate(t.updatedAt)}</div>
      </div>
    `;

    document.getElementById('detailDeleteBtn').onclick = () => confirmDelete(id);
    document.getElementById('detailEditBtn').onclick   = () => { detailModal.hide(); openEdit(id); };

    detailModal.show();
  }

  // ── Create / Edit modal ──
  function openCreate() {
    document.getElementById('formModalTitle').textContent = 'Nova Tarefa';
    document.getElementById('formSubmitBtn').textContent  = 'Criar';
    document.getElementById('editingId').value = '';
    document.getElementById('fTitle').value    = '';
    document.getElementById('fDesc').value     = '';
    document.getElementById('fPriority').value = 'MEDIUM';
    document.getElementById('fStatus').value   = 'PENDING';
    document.getElementById('formAlert').className = 'alert d-none py-2';
    formModal.show();
  }

  function openEdit(id) {
    const t = allTasks.find(x => x.id === id);
    if (!t) return;
    document.getElementById('formModalTitle').textContent = 'Editar Tarefa';
    document.getElementById('formSubmitBtn').textContent  = 'Salvar';
    document.getElementById('editingId').value = t.id;
    document.getElementById('fTitle').value    = t.title;
    document.getElementById('fDesc').value     = t.description;
    document.getElementById('fPriority').value = t.priority;
    document.getElementById('fStatus').value   = t.status;
    document.getElementById('formAlert').className = 'alert d-none py-2';
    formModal.show();
  }

  async function submitForm() {
    const id    = document.getElementById('editingId').value;
    const title = document.getElementById('fTitle').value.trim();
    const desc  = document.getElementById('fDesc').value.trim();
    const formAlert = document.getElementById('formAlert');
    const submitBtn = document.getElementById('formSubmitBtn');

    if (!title || !desc) {
      formAlert.textContent = 'Título e descrição são obrigatórios.';
      formAlert.className = 'alert alert-danger py-2';
      return;
    }

    const isEdit = !!id;
    const url    = isEdit ? `/tasks/edit/${id}` : '/tasks/create';
    const method = isEdit ? 'PUT' : 'POST';

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>';
    formAlert.className = 'alert d-none';

    try {
      const res = await fetch(url, {
        method,
        headers: authHeaders(),
        body: JSON.stringify({
          title,
          description: desc,
          priority: document.getElementById('fPriority').value,
          status:   document.getElementById('fStatus').value
        })
      });

      const data = await res.json();
      if (!res.ok || !data.success) {
        formAlert.textContent = data.message || 'Erro ao salvar tarefa.';
        formAlert.className = 'alert alert-danger py-2';
        return;
      }

      formModal.hide();
      loadTasks();
    } catch {
      formAlert.textContent = 'Erro de conexão.';
      formAlert.className = 'alert alert-danger py-2';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = isEdit ? 'Salvar' : 'Criar';
    }
  }

  // ── Delete ──
  async function confirmDelete(id) {
    if (!confirm('Tem certeza que deseja excluir esta tarefa?')) return;
    detailModal.hide();
    try {
      const res = await fetch(`/tasks/delete/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (res.ok) loadTasks();
    } catch {}
  }

  loadTasks();
</script>
</body>
</html>
